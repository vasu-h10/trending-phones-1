<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Trending Phones</title>

<link rel="stylesheet" href="style.css">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1976d2">

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

</head>

<body>

<header>
🔥 Trending Phones Today
</header>

<!-- APP BANNER -->

<div class="app-banner">
<img src="banner.jpg" alt="Trending Phones Banner">
</div>


<!-- VIDEO AD BANNERS -->

<div class="ad-scroll">

<video autoplay muted loop playsinline
onclick="window.open('https://www.amazon.in','_blank')">
<source src="amazon-ad.mp4" type="video/mp4">
</video>

<video autoplay muted loop playsinline
onclick="window.open('https://www.flipkart.com','_blank')">
<source src="flipkart-ad.mp4" type="video/mp4">
</video>

<video autoplay muted loop playsinline
onclick="window.open('https://www.amazon.in','_blank')">
<source src="mobile-sale.mp4" type="video/mp4">
</video>

</div>


<!-- SEARCH -->

<div class="search-box">
<input id="search" placeholder="Search phone..." oninput="searchPhones()">
</div>

<h3 style="padding-left:10px">🔥 Trending Searches</h3>

<div id="trending"></div>

<div id="scroll" class="scroll-container"></div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js");
}
</script>

</body>
</html>

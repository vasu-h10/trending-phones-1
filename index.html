<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trending Phones</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1976d2">

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, increment, updateDoc, doc } 
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC3DGlJNkDoNRgwdqJCzpXDycD7oDqnKzs",
    authDomain: "trending-phones.firebaseapp.com",
    projectId: "trending-phones",
    storageBucket: "trending-phones.firebasestorage.app",
    messagingSenderId: "40687626103",
    appId: "1:40687626103:web:4194203077497086076372"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.collection = collection;
  window.addDoc = addDoc;
  window.getDocs = getDocs;
  window.query = query;
  window.orderBy = orderBy;
  window.limit = limit;
  window.increment = increment;
  window.updateDoc = updateDoc;
  window.doc = doc;
</script>

</head>

<body>

<div class="app-banner">
  <img src="banner.jpg"
       onerror="this.src='https://via.placeholder.com/800x200?text=Trending+Phones'">
  <div class="banner-title">Trending Phones</div>
</div>

<h2 style="padding:10px;">Latest Trending Smartphones</h2>

<div class="section">
<p>Discover latest phones, compare specs and see trending devices in real-time.</p>
</div>

<div class="search-box">
  <input id="search" placeholder="Search phone..." oninput="searchPhones()">
</div>

<h3 style="padding-left:10px">🔥 Live Trending</h3>

<div id="trending"></div>
<div id="scroll" class="scroll-container"></div>

<script src="app.js"></script>

</body>
</html>
